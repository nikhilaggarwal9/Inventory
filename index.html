<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Database | Tbo Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        :root {
            --bg: #f8f9fa; --surface: #ffffff; --border: #e9ecef;
            --text: #212529; --text-light: #6c757d;
            --primary: #5b8fff; --success: #2d9e5f; --danger: #d64f4f; --warning: #c08a1e;
            --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }
        .screen { display: none; min-height: 100vh; padding: 20px; }
        .screen.active { display: block; }
        .container { max-width: 1100px; margin: 0 auto; }
        .auth-card { max-width: 400px; margin: 50px auto; background: var(--surface); padding: 2rem; border-radius: var(--radius); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .role-btn { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; background: var(--surface); text-align: left; transition: 0.2s; }
        .role-btn:hover { border-color: var(--primary); background: #f0f5ff; }
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 2rem; }
        .stat-card { background: var(--surface); padding: 1.5rem; border-radius: var(--radius); border: 1px solid var(--border); }
        .stat-val { font-size: 2rem; font-weight: 700; font-family: 'DM Mono'; }
        table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: var(--radius); overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
        th { background: #f1f3f5; font-size: 0.7rem; text-transform: uppercase; color: var(--text-light); }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-p { background: var(--primary); color: white; }
        .btn-p:disabled { background: #ccc; cursor: not-allowed; }
        .btn-s { background: var(--border); color: var(--text); }
        .btn-d { background: #fff5f5; color: var(--danger); border: 1px solid #ffe3e3; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
        textarea { resize: vertical; min-height: 80px; }
        .tab-bar { display: flex; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .tab-btn { padding: 10px 0; background: none; border: none; cursor: pointer; color: var(--text-light); border-bottom: 2px solid transparent; white-space: nowrap; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
        .badge-ok { background: #e6fcf5; color: var(--success); }
        .badge-low { background: #fff9db; color: var(--warning); }
        .badge-out { background: #fff5f5; color: var(--danger); }
        #stock-display { background: #f0f5ff; color: var(--primary); padding: 8px 12px; border-radius: 8px; font-weight: 700; display: inline-block; margin-bottom: 10px; }
        #loading-overlay { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    </style>
</head>
<body>

    <div id="loading-overlay">Tbo Academy | Initializing...</div>

    <!-- LOGIN SCREEN -->
    <div id="screen-login" class="screen active">
        <div class="auth-card">
            <h1>Inventory Database</h1>
            <p style="color: var(--text-light); margin-bottom: 2rem;">Tbo Academy</p>
            <div id="login-main">
                <button class="role-btn" onclick="toggleAuthArea('admin')"><strong>Admin</strong><br><small>Full dashboard (Pin Required)</small></button>
                <button class="role-btn" onclick="loginWithGoogle()"><strong>Team Member</strong><br><small>Sign in with Google Verification</small></button>
            </div>
            <div id="admin-auth-area" style="display: none;">
                <h3>Admin Login</h3>
                <label>Admin Password</label><input type="password" id="admin-pass">
                <button class="btn btn-p" style="width: 100%;" onclick="attemptAdminLogin()">Sign In</button>
                <button class="btn btn-s" style="width: 100%; margin-top: 10px;" onclick="location.reload()">Back</button>
            </div>
        </div>
    </div>

    <!-- ADMIN SCREEN -->
    <div id="screen-admin" class="screen">
        <div class="container">
            <div class="nav"><h2>⚡ Admin Control</h2><button class="btn btn-s" onclick="logout()">Sign Out</button></div>
            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchTab('dash')">Overview</button>
                <button class="tab-btn" onclick="switchTab('items')">Inventory</button>
                <button class="tab-btn" onclick="switchTab('logs')">History</button>
                <button class="tab-btn" onclick="switchTab('settings')">⚙️ Settings</button>
            </div>

            <!-- Dashboard -->
            <div id="tab-dash" class="tab-content">
                <div class="grid">
                    <div class="stat-card"><div>Total Units</div><div class="stat-val" id="stat-units">0</div></div>
                    <div class="stat-card"><div>Items</div><div class="stat-val" id="stat-items">0</div></div>
                    <div class="stat-card"><div>Low Stock</div><div class="stat-val" id="stat-low" style="color: var(--danger);">0</div></div>
                </div>
                <table><thead><tr><th>Item</th><th>Stock</th><th>Action</th></tr></thead><tbody id="dash-table"></tbody></table>
            </div>

            <!-- Inventory -->
            <div id="tab-items" class="tab-content" style="display:none">
                <div class="stat-card" style="margin-bottom: 1rem;">
                    <h3>Add Item</h3>
                    <input type="text" id="new-item-name" placeholder="Item Name"><input type="number" id="new-item-stock" placeholder="Opening Stock">
                    <button class="btn btn-p" onclick="handleAddItem()">Add to Cloud</button>
                </div>
                <table id="manage-table"></table>
            </div>

            <!-- History -->
            <div id="tab-logs" class="tab-content" style="display:none">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3>Transaction Log</h3>
                    <button class="btn btn-p" onclick="exportToCSV()">Export History (Excel)</button>
                </div>
                <table><thead><tr><th>Time</th><th>Item</th><th>Type</th><th>Qty</th><th>User</th><th>Purpose/Notes</th></tr></thead><tbody id="log-table"></tbody></table>
            </div>

            <!-- Settings -->
            <div id="tab-settings" class="tab-content" style="display:none">
                <div class="stat-card" style="margin-bottom: 1rem;">
                    <h3>Update Admin Pin</h3>
                    <input type="password" id="set-admin-pass" placeholder="New Password">
                    <button class="btn btn-p" onclick="saveAdminPassword()">Update</button>
                </div>
                <div class="stat-card">
                    <h3>Alert Configuration (EmailJS)</h3>
                    <label>Public Key</label><input type="text" id="set-ejs-key">
                    <label>Service ID</label><input type="text" id="set-ejs-svc">
                    <label>Template ID</label><input type="text" id="set-ejs-tpl">
                    <label>Admin Email</label><input type="text" id="set-admin-email">
                    <button class="btn btn-p" onclick="saveSettings()">Save Configuration</button>
                </div>
            </div>
        </div>
    </div>

    <!-- USER SCREEN -->
    <div id="screen-user" class="screen">
        <div class="container" style="max-width: 500px;">
            <div class="nav"><h2 id="user-greeting">Hello</h2><button class="btn btn-s" onclick="logout()">Logout</button></div>
            <div class="auth-card" style="margin-top: 0; max-width: 100%;">
                <div id="stock-display">Select an item to see stock</div>
                
                <label>Item</label>
                <select id="entry-item" onchange="updateRemainingDisplay()"></select>
                
                <label>Transaction Type</label>
                <select id="entry-type">
                    <option value="OUT">Stock Out (Take)</option>
                    <option value="IN">Stock In (Add)</option>
                    <option value="ADJ">Adjust Inventory</option>
                </select>
                
                <label>Quantity</label>
                <input type="number" id="entry-qty" value="1" min="1">
                
                <label>Purpose / Notes (Mandatory)</label>
                <textarea id="entry-note" placeholder="Why are you taking/adding this stock?"></textarea>

                <button class="btn btn-p" style="width: 100%;" onclick="handleUserEntry()">Submit Update</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, setDoc, deleteDoc, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2-G7-Xt4LnARWQ6L9TYIhiLXhs9HHg6E",
            authDomain: "automated-inventory-sync.firebaseapp.com",
            projectId: "automated-inventory-sync",
            storageBucket: "automated-inventory-sync.firebasestorage.app",
            messagingSenderId: "823946326055",
            appId: "1:823946326055:web:29ede9f4dbc33b02d2de02"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let inventory = [], logs = [], config = {};
        let loggedInUser = '', cloudAdminPass = 'admin123';

        // INITIALIZATION
        async function init() {
            onSnapshot(collection(db, "inventory"), (snap) => {
                inventory = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                updateUI();
                updateRemainingDisplay();
                document.getElementById('loading-overlay').style.display = 'none';
            });

            onSnapshot(doc(db, "settings", "appConfig"), (d) => {
                if (d.exists()) {
                    const data = d.data();
                    cloudAdminPass = data.adminPassword || 'admin123';
                    config = data.emailConfig || {};
                    if(config.publicKey) emailjs.init(config.publicKey);
                    fillSettingsUI();
                }
            });

            onSnapshot(query(collection(db, "logs"), orderBy("time", "desc"), limit(300)), (snap) => {
                logs = snap.docs.map(d => d.data());
                renderLogs();
            });
        }

        // GOOGLE AUTH
        window.loginWithGoogle = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                loggedInUser = result.user.displayName;
                document.getElementById('user-greeting').textContent = `Hello, ${loggedInUser}`;
                showScreen('screen-user');
            } catch (error) {
                alert("Google Sign-In failed: " + error.message);
            }
        };

        window.logout = async () => {
            await signOut(auth);
            location.reload();
        };

        // ADMIN LOGIN
        window.toggleAuthArea = (m) => {
            document.getElementById('login-main').style.display = 'none';
            document.getElementById('admin-auth-area').style.display = 'block';
        };

        window.attemptAdminLogin = () => {
            const p = document.getElementById('admin-pass').value;
            if (p === cloudAdminPass) {
                loggedInUser = "Admin";
                showScreen('screen-admin');
            } else alert("Incorrect Admin Pin");
        };

        // USER INTERFACE HELPER
        window.updateRemainingDisplay = () => {
            const itemName = document.getElementById('entry-item').value;
            const item = inventory.find(i => i.name === itemName);
            const display = document.getElementById('stock-display');
            if (item) {
                display.textContent = `Current Stock Available: ${item.stock} units`;
                display.style.color = item.stock < (item.initial * 0.35) ? 'var(--danger)' : 'var(--primary)';
            }
        };

        // CORE LOGIC: STOCK UPDATE
        window.updateStock = async (id, name, currentStock, change, type, initial, note) => {
            let newQty;
            if (type === 'IN') newQty = currentStock + change;
            else if (type === 'OUT') newQty = Math.max(0, currentStock - change);
            else newQty = change;

            await updateDoc(doc(db, "inventory", id), { stock: newQty });
            await addDoc(collection(db, "logs"), {
                time: new Date().toISOString(),
                item: name, type, qty: change, user: loggedInUser, notes: note || "N/A"
            });

            // Threshold Check
            const threshold = initial * 0.35;
            if (type === 'OUT' && newQty <= threshold && config.serviceId) {
                emailjs.send(config.serviceId, config.templateId, {
                    item_name: name, current_stock: newQty, threshold: Math.round(threshold), to_email: config.adminEmail
                }).catch(e => console.error("Email Error:", e));
            }
        };

        window.handleUserEntry = async () => {
            const itemName = document.getElementById('entry-item').value;
            const type = document.getElementById('entry-type').value;
            const qty = parseInt(document.getElementById('entry-qty').value);
            const note = document.getElementById('entry-note').value.trim();
            const item = inventory.find(i => i.name === itemName);

            if (!note) return alert("Please enter a purpose/note. This is mandatory.");
            if (isNaN(qty) || qty < 1) return alert("Please enter a valid quantity.");
            if (type === 'OUT' && qty > item.stock) return alert("Cannot take more than available stock.");

            await updateStock(item.id, item.name, item.stock, qty, type, item.initial, note);
            alert("Record updated successfully!");
            document.getElementById('entry-note').value = '';
            document.getElementById('entry-qty').value = '1';
        };

        // EXPORT
        window.exportToCSV = () => {
            let csv = "Time,Item,Type,Quantity,User,Notes\n";
            logs.forEach(l => {
                csv += `${new Date(l.time).toLocaleString().replace(',', '')},${l.item},${l.type},${l.qty},${l.user},"${l.notes}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', 'Tbo_Academy_Inventory_Log.csv');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        // ADMIN UTILS
        window.handleAddItem = async () => {
            const n = document.getElementById('new-item-name').value;
            const s = parseInt(document.getElementById('new-item-stock').value) || 0;
            if (n) await addDoc(collection(db, "inventory"), { name: n, stock: s, initial: s || 1 });
            document.getElementById('new-item-name').value = ''; document.getElementById('new-item-stock').value = '';
        };

        window.handleDeleteItem = async (id, name) => {
            if (confirm(`Permanently delete "${name}"?`)) await deleteDoc(doc(db, "inventory", id));
        };

        window.saveAdminPassword = async () => {
            const np = document.getElementById('set-admin-pass').value;
            await setDoc(doc(db, "settings", "appConfig"), { adminPassword: np }, { merge: true });
            alert("Admin Pin Updated");
        };

        window.saveSettings = async () => {
            const eConfig = {
                publicKey: document.getElementById('set-ejs-key').value,
                serviceId: document.getElementById('set-ejs-svc').value,
                templateId: document.getElementById('set-ejs-tpl').value,
                adminEmail: document.getElementById('set-admin-email').value
            };
            await setDoc(doc(db, "settings", "appConfig"), { emailConfig: eConfig }, { merge: true });
            alert("Settings Saved");
        };

        function fillSettingsUI() {
            document.getElementById('set-ejs-key').value = config.publicKey || '';
            document.getElementById('set-ejs-svc').value = config.serviceId || '';
            document.getElementById('set-ejs-tpl').value = config.templateId || '';
            document.getElementById('set-admin-email').value = config.adminEmail || '';
        }

        function updateUI() {
            const totalUnits = inventory.reduce((acc, curr) => acc + (Number(curr.stock) || 0), 0);
            const lowCount = inventory.filter(i => (i.stock / (i.initial || 1)) < 0.35).length;
            document.getElementById('stat-units').textContent = totalUnits;
            document.getElementById('stat-items').textContent = inventory.length;
            document.getElementById('stat-low').textContent = lowCount;
            document.getElementById('dash-table').innerHTML = inventory.map(i => {
                const pct = (i.stock / (i.initial || 1)) * 100;
                const status = i.stock === 0 ? 'Out' : pct < 35 ? 'Low' : 'OK';
                return `<tr><td><strong>${i.name}</strong></td><td>${i.stock} <span class="badge badge-${status.toLowerCase()}">${status}</span></td><td>
                    <button class="btn btn-s" onclick="updateStock('${i.id}','${i.name}', ${i.stock}, 1, 'IN', ${i.initial}, 'Admin manual update')">+</button>
                    <button class="btn btn-d" onclick="updateStock('${i.id}','${i.name}', ${i.stock}, 1, 'OUT', ${i.initial}, 'Admin manual update')">−</button>
                </td></tr>`;
            }).join('');
            document.getElementById('manage-table').innerHTML = `<thead><tr><th>Name</th><th>Initial</th><th>Action</th></tr></thead>
                <tbody>${inventory.map(i => `<tr><td>${i.name}</td><td>${i.initial}</td><td><button class="btn btn-d" onclick="handleDeleteItem('${i.id}','${i.name}')">Delete</button></td></tr>`).join('')}</tbody>`;
            document.getElementById('entry-item').innerHTML = inventory.map(i => `<option value="${i.name}">${i.name}</option>`).join('');
        }

        function renderLogs() { 
            document.getElementById('log-table').innerHTML = logs.map(l => `<tr>
                <td style="white-space:nowrap">${new Date(l.time).toLocaleTimeString()}</td>
                <td>${l.item}</td>
                <td><strong>${l.type}</strong></td>
                <td>${l.qty}</td>
                <td>${l.user}</td>
                <td style="color:var(--text-light); font-style:italic">${l.notes}</td>
            </tr>`).join(''); 
        }

        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        window.switchTab = (t) => { document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none'); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('tab-' + t).style.display = 'block'; event.target.classList.add('active'); };

        init();
    </script>
</body>
</html>
