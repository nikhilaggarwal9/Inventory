<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Inventory Tracker | Firebase Cloud</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
:root{
  --bg:#f7f3ee;
  --surface:#fdfaf6;
  --surface2:#f2ede6;
  --surface3:#ebe4da;
  --border:#ddd6cb;
  --border2:#cfc8bc;
  --text:#2a2420;
  --text2:#6b5f55;
  --text3:#a89e94;
  --accent:#5b8fff;
  --accent-glow:rgba(91,143,255,0.14);
  --green:#2d9e5f;
  --green-bg:rgba(45,158,95,0.1);
  --red:#d64f4f;
  --red-bg:rgba(214,79,79,0.09);
  --amber:#c08a1e;
  --amber-bg:rgba(192,138,30,0.1);
  --radius:12px;
  --radius-sm:8px;
  --font:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.35}
.glow-orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;animation:drift 12s ease-in-out infinite alternate}
.glow-orb.a{width:500px;height:500px;background:rgba(91,143,255,0.06);top:-100px;right:-100px}
.glow-orb.b{width:400px;height:400px;background:rgba(192,138,30,0.05);bottom:-50px;left:-100px;animation-delay:-6s}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(30px,20px)}}
.screen{display:none;position:relative;z-index:1}
.screen.active{display:block}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.login-box{width:100%;max-width:480px;animation:slideUp .5s cubic-bezier(.16,1,.3,1) both}
@keyframes slideUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
.app-badge{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:2rem;letter-spacing:.05em;text-transform:uppercase}
.app-badge span{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.login-h1{font-size:clamp(28px,6vw,42px);font-weight:600;line-height:1.1;letter-spacing:-.02em;margin-bottom:.75rem;color:var(--text)}
.login-sub{font-size:15px;color:var(--text2);margin-bottom:2.5rem;line-height:1.6}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem}
.role-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem 1.25rem;cursor:pointer;text-align:center;transition:all .2s;position:relative;overflow:hidden}
.role-card:hover{border-color:var(--accent);background:var(--surface2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(42,36,32,.1)}
.role-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:22px;font-weight:700}
.icon-admin{background:rgba(91,143,255,0.12);color:var(--accent);border:1px solid rgba(91,143,255,0.25)}
.icon-user{background:rgba(45,158,95,0.1);color:var(--green);border:1px solid rgba(45,158,95,0.25)}
.role-card-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
.role-card-desc{font-size:12px;color:var(--text2);line-height:1.5}
.auth-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;animation:expandDown .3s cubic-bezier(.16,1,.3,1) both;transform-origin:top}
@keyframes expandDown{from{opacity:0;transform:scaleY(.92) translateY(-8px)}to{opacity:1;transform:scaleY(1) translateY(0)}}
.form-group{margin-bottom:1rem}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;text-transform:uppercase}
.form-input{width:100%;font-size:14px;font-family:var(--font);padding:10px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);outline:none}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.btn-primary{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;box-shadow:0 4px 16px rgba(91,143,255,0.25)}
.btn-secondary{padding:8px 16px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);font-size:13px;font-weight:500;cursor:pointer}
.btn-danger{padding:8px 16px;background:var(--red-bg);border:1px solid rgba(214,79,79,.3);border-radius:var(--radius-sm);color:var(--red);cursor:pointer}
.btn-cancel{width:100%;padding:10px;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;color:var(--text2);margin-top:8px;cursor:pointer}
.toast{background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:12px 18px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:1rem;display:none;animation:toastIn .3s}
.toast.show{display:flex;align-items:center;gap:10px}
.toast.error{color:var(--red);background:var(--red-bg)}
.toast.success{color:var(--green);background:var(--green-bg)}
@keyframes toastIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:1px solid var(--border);background:rgba(247,243,238,.85);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.tabs-bar{display:flex;gap:2px;padding:.75rem 1.5rem 0;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto}
.tab-btn{padding:8px 16px;font-size:13px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent}
.tab-btn.active{color:var(--text);border-bottom-color:var(--accent)}
.main{padding:1.5rem}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
.stat-label{font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:.5rem}
.stat-val{font-size:32px;font-weight:600;font-family:var(--mono)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-body{padding:1.25rem}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border);background:var(--surface2)}
td{padding:12px 14px;border-bottom:1px solid var(--border)}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge.ok{background:var(--green-bg);color:var(--green)}
.badge.low{background:var(--amber-bg);color:var(--amber)}
.badge.out{background:var(--red-bg);color:var(--red)}
.bar-wrap{width:80px;height:4px;background:var(--surface3);border-radius:2px;display:inline-block;vertical-align:middle;margin-right:8px;overflow:hidden}
.bar-fill{height:100%;transition:width .6s}
.type-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.type-btn{padding:11px 8px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);cursor:pointer;font-size:13px}
.type-btn.sel-in{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.type-btn.sel-out{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.type-btn.sel-adj{background:rgba(91,143,255,.1);color:var(--accent);border-color:var(--accent)}
.alert-banner{display:none;background:linear-gradient(135deg,rgba(192,138,30,.1),rgba(214,79,79,.07));border:1px solid rgba(192,138,30,.3);padding:1rem;margin-bottom:1.5rem;border-radius:var(--radius)}
.alert-banner.show{display:flex;align-items:center;gap:12px}
.user-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
@media(max-width:640px){.stat-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="glow-orb a"></div>
<div class="glow-orb b"></div>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-page">
    <div class="login-box">
      <div class="app-badge"><span></span>Inventory Cloud</div>
      <h1 class="login-h1">Syncing Data...</h1>
      <p class="login-sub" id="login-sub-text">Please wait while we connect to the cloud.</p>

      <div class="role-grid" id="role-grid" style="display:none">
        <div class="role-card" onclick="showAdminLogin()">
          <div class="role-icon icon-admin">⚡</div>
          <div class="role-card-title">Admin</div>
          <div class="role-card-desc">Full dashboard access</div>
        </div>
        <div class="role-card" onclick="showUserLogin()">
          <div class="role-icon icon-user">📦</div>
          <div class="role-card-title">Team</div>
          <div class="role-card-desc">Stock entry only</div>
        </div>
      </div>

      <div id="admin-login-area" style="display:none">
        <div class="auth-panel">
          <div class="form-group">
            <label class="form-label">Admin Password</label>
            <input type="password" id="pw-input" class="form-input" onkeydown="if(event.key==='Enter')tryAdminLogin()"/>
          </div>
          <div id="login-toast" class="toast error"></div>
          <button class="btn-primary" onclick="tryAdminLogin()">Sign in →</button>
          <button class="btn-cancel" onclick="hideAdminLogin()">Cancel</button>
        </div>
      </div>

      <div id="user-login-area" style="display:none">
        <div class="auth-panel">
          <div class="form-group">
            <label class="form-label">Your Name</label>
            <input type="text" id="user-login-name" class="form-input" list="user-names-list"/>
            <datalist id="user-names-list"></datalist>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="user-login-pw" class="form-input" onkeydown="if(event.key==='Enter')tryUserLogin()"/>
          </div>
          <div id="user-login-toast" class="toast error"></div>
          <button class="btn-primary" onclick="tryUserLogin()">Sign in →</button>
          <button class="btn-cancel" onclick="hideUserLogin()">Cancel</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- USER SCREEN -->
<div id="screen-user" class="screen">
  <div class="app-layout">
    <div class="topbar">
      <div class="topbar-brand">📦 Team Entry</div>
      <button class="btn-secondary" onclick="logout()">Sign out</button>
    </div>
    <div class="main">
      <div style="max-width:500px;margin:0 auto">
        <h2 id="user-welcome" style="margin-bottom:1rem"></h2>
        <div id="user-toast" class="toast success"></div>
        <div class="card"><div class="card-body">
          <div class="form-group">
            <label class="form-label">Item</label>
            <select id="u-item" class="form-input"></select>
          </div>
          <div class="form-group">
            <label class="form-label">Type</label>
            <div class="type-row">
              <button class="type-btn sel-in" onclick="selType('IN',this)">+ In</button>
              <button class="type-btn" onclick="selType('OUT',this)">− Out</button>
              <button class="type-btn" onclick="selType('ADJ',this)">~ Adj</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Quantity</label>
            <input type="number" id="u-qty" class="form-input" value="1" min="1"/>
          </div>
          <button class="btn-primary" onclick="submitUserEntry()">Submit Entry</button>
        </div></div>
      </div>
    </div>
  </div>
</div>

<!-- ADMIN SCREEN -->
<div id="screen-admin" class="screen">
  <div class="app-layout">
    <div class="topbar">
      <div class="topbar-brand">⚡ Admin Console</div>
      <button class="btn-secondary" onclick="logout()">Sign out</button>
    </div>
    <div class="tabs-bar">
      <button class="tab-btn active" onclick="switchTab('dashboard',this)">Dashboard</button>
      <button class="tab-btn" onclick="switchTab('inventory',this)">Manage</button>
      <button class="tab-btn" onclick="switchTab('log',this)">History</button>
      <button class="tab-btn" onclick="switchTab('users',this)">Team</button>
    </div>
    <div class="main">
      <div id="admin-toast" class="toast success"></div>

      <!-- DASHBOARD -->
      <div id="apanel-dashboard" class="panel active">
        <div class="alert-banner" id="low-stock-banner">
          <div style="font-size:20px">⚠️</div>
          <div style="flex:1"><div style="font-weight:600">Low Stock Alert</div><div id="low-stock-items" style="font-size:12px"></div></div>
        </div>
        <div class="stat-grid">
          <div class="stat-card"><div class="stat-label">Total Units</div><div class="stat-val" id="s-units">0</div></div>
          <div class="stat-card"><div class="stat-label">Items</div><div class="stat-val" id="s-total">0</div></div>
          <div class="stat-card"><div class="stat-label">Low Stock</div><div class="stat-val" style="color:var(--red)" id="s-low">0</div></div>
          <div class="stat-card"><div class="stat-label">Logs</div><div class="stat-val" id="s-txns">0</div></div>
        </div>
        <div class="card">
          <div class="tbl-wrap">
            <table>
              <thead><tr><th>Item</th><th>Stock</th><th>Level</th><th>Action</th></tr></thead>
              <tbody id="dash-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- INVENTORY -->
      <div id="apanel-inventory" class="panel">
        <div class="card" style="margin-bottom:1.5rem"><div class="card-body">
          <div class="form-group"><label class="form-label">New Item Name</label><input type="text" id="new-name" class="form-input"/></div>
          <button class="btn-primary" onclick="addItem()">Add Item</button>
        </div></div>
        <div class="card"><div class="tbl-wrap">
          <table><thead><tr><th>Name</th><th>Action</th></tr></thead><tbody id="manage-tbody"></tbody></table>
        </div></div>
      </div>

      <!-- LOG -->
      <div id="apanel-log" class="panel">
        <div class="card"><div class="tbl-wrap">
          <table><thead><tr><th>Time</th><th>Item</th><th>Type</th><th>Qty</th><th>By</th></tr></thead><tbody id="log-tbody"></tbody></table>
        </div></div>
      </div>

      <!-- TEAM -->
      <div id="apanel-users" class="panel">
        <div class="card" style="margin-bottom:1.5rem"><div class="card-body">
          <div class="form-group"><label class="form-label">Member Name</label><input type="text" id="nu-name" class="form-input"/></div>
          <div class="form-group"><label class="form-label">Member Password</label><input type="password" id="nu-pw" class="form-input"/></div>
          <button class="btn-primary" onclick="addUser()">Add Team Member</button>
        </div></div>
        <div class="card"><div class="card-body" id="users-list"></div></div>
      </div>

    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════
   FIREBASE CONFIG
════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyB2-G7-Xt4LnARWQ6L9TYIhiLXhs9HHg6E",
  authDomain: "automated-inventory-sync.firebaseapp.com",
  projectId: "automated-inventory-sync",
  storageBucket: "automated-inventory-sync.firebasestorage.app",
  messagingSenderId: "823946326055",
  appId: "1:823946326055:web:29ede9f4dbc33b02d2de02"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ════════════════════════════════════
   STATE & SYNC
════════════════════════════════════ */
let inv = [];
let txns = [];
let users = [];
let adminPw = 'admin123';
let currentUser = '';
let uType = 'IN';

// REAL-TIME LISTENERS
function initApp() {
  // Sync Inventory
  db.collection("inventory").orderBy("name").onSnapshot(snap => {
    inv = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    if(inv.length === 0) seedData();
    renderDash();
    renderManage();
    populateSel();
    
    // Hide loading
    document.querySelector('.login-h1').textContent = "Welcome back.";
    document.getElementById('login-sub-text').textContent = "Sign in to continue.";
    document.getElementById('role-grid').style.display = 'grid';
  });

  // Sync Logs
  db.collection("transactions").orderBy("time", "desc").limit(50).onSnapshot(snap => {
    txns = snap.docs.map(doc => doc.data());
    renderLog();
    renderDash();
  });

  // Sync Users
  db.collection("users").onSnapshot(snap => {
    users = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderUsers();
  });

  // Sync Config (Password)
  db.collection("config").doc("settings").onSnapshot(doc => {
    if(doc.exists()) adminPw = doc.data().adminPassword;
  });
}

// INITIAL SEEDING
function seedData() {
  const defaults = [
    {name:"YAS Island Mugs",stock:21,initial:21}, {name:"Bahrain Diaries",stock:46,initial:46},
    {name:"DC Diaries",stock:122,initial:122}, {name:"Abu Dhabi Diaries",stock:324,initial:324}
  ];
  defaults.forEach(item => db.collection("inventory").add(item));
}

/* ════════════════════════════════════
   ACTIONS
════════════════════════════════════ */
async function addItem() {
  const name = document.getElementById('new-name').value.trim();
  if(!name) return;
  await db.collection("inventory").add({ name, stock: 0, initial: 1 });
  document.getElementById('new-name').value = '';
  showToast('admin-toast', 'Item added');
}

async function updateStock(itemId, newStock, itemName, type, qty, person) {
  await db.collection("inventory").doc(itemId).update({ stock: newStock });
  await db.collection("transactions").add({
    time: new Date().toISOString(),
    item: itemName,
    type,
    qty,
    person
  });
}

function adminAdd(id, name) {
  const qty = parseInt(prompt("Add amount:"));
  if(!qty) return;
  const item = inv.find(i => i.id === id);
  updateStock(id, item.stock + qty, name, 'IN', qty, 'Admin');
}

function adminRemove(id, name) {
  const qty = parseInt(prompt("Remove amount:"));
  if(!qty) return;
  const item = inv.find(i => i.id === id);
  updateStock(id, Math.max(0, item.stock - qty), name, 'OUT', qty, 'Admin');
}

async function submitUserEntry() {
  const itemName = document.getElementById('u-item').value;
  const qty = parseInt(document.getElementById('u-qty').value);
  if(!itemName || !qty) return;

  const item = inv.find(i => i.name === itemName);
  let next = item.stock;
  if(uType === 'IN') next += qty;
  else if(uType === 'OUT') next = Math.max(0, next - qty);
  else next = qty;

  await updateStock(item.id, next, itemName, uType, qty, currentUser);
  showToast('user-toast', 'Entry Saved');
}

async function addUser() {
  const name = document.getElementById('nu-name').value.trim();
  const pw = document.getElementById('nu-pw').value;
  if(!name || !pw) return;
  await db.collection("users").add({ name, pw, active: true });
  document.getElementById('nu-name').value = '';
  document.getElementById('nu-pw').value = '';
}

/* ════════════════════════════════════
   UI HELPERS
════════════════════════════════════ */
function renderDash() {
  let units = 0, low = 0;
  let html = '';
  inv.forEach(item => {
    units += item.stock;
    const pct = Math.round((item.stock / (item.initial || 1)) * 100);
    if(pct < 35) low++;
    const badge = item.stock === 0 ? 'out' : pct < 35 ? 'low' : 'ok';
    const color = item.stock === 0 ? 'var(--red)' : pct < 35 ? 'var(--amber)' : 'var(--green)';
    
    html += `<tr>
      <td>${item.name}</td>
      <td style="font-family:var(--mono)">${item.stock}</td>
      <td><span class="bar-wrap"><span class="bar-fill" style="width:${pct}%;background:${color}"></span></span></td>
      <td>
        <button class="btn-secondary" onclick="adminAdd('${item.id}','${item.name}')">+</button>
        <button class="btn-danger" onclick="adminRemove('${item.id}','${item.name}')">−</button>
      </td>
    </tr>`;
  });
  document.getElementById('dash-tbody').innerHTML = html;
  document.getElementById('s-units').textContent = units;
  document.getElementById('s-total').textContent = inv.length;
  document.getElementById('s-low').textContent = low;
  document.getElementById('s-txns').textContent = txns.length;

  const banner = document.getElementById('low-stock-banner');
  if(low > 0) banner.classList.add('show'); else banner.classList.remove('show');
}

function renderLog() {
  let html = '';
  txns.forEach(t => {
    html += `<tr>
      <td style="font-size:11px">${new Date(t.time).toLocaleTimeString()}</td>
      <td>${t.item}</td>
      <td style="font-weight:600">${t.type}</td>
      <td>${t.qty}</td>
      <td>${t.person}</td>
    </tr>`;
  });
  document.getElementById('log-tbody').innerHTML = html;
}

function renderUsers() {
  let html = '';
  users.forEach(u => {
    html += `<div class="user-row">
      <span>${u.name}</span>
      <button class="btn-danger" onclick="db.collection('users').doc('${u.id}').delete()">Remove</button>
    </div>`;
  });
  document.getElementById('users-list').innerHTML = html || 'No team members';
  
  // Update login datalist
  const dl = document.getElementById('user-names-list');
  dl.innerHTML = users.map(u => `<option value="${u.name}">`).join('');
}

function renderManage() {
  document.getElementById('manage-tbody').innerHTML = inv.map(i => `
    <tr><td>${i.name}</td><td><button class="btn-danger" onclick="db.collection('inventory').doc('${i.id}').delete()">Delete</button></td></tr>
  `).join('');
}

function populateSel() {
  const s = document.getElementById('u-item');
  if(!s) return;
  s.innerHTML = inv.map(i => `<option value="${i.name}">${i.name}</option>`).join('');
}

/* ════════════════════════════════════
   AUTH & TABS
════════════════════════════════════ */
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function showAdminLogin(){document.getElementById('role-grid').style.display='none';document.getElementById('admin-login-area').style.display='block';}
function hideAdminLogin(){document.getElementById('role-grid').style.display='grid';document.getElementById('admin-login-area').style.display='none';}
function tryAdminLogin(){
  if(document.getElementById('pw-input').value === adminPw) show('screen-admin');
  else showToast('login-toast', 'Incorrect Password', 'error');
}
function showUserLogin(){document.getElementById('role-grid').style.display='none';document.getElementById('user-login-area').style.display='block';}
function hideUserLogin(){document.getElementById('role-grid').style.display='grid';document.getElementById('user-login-area').style.display='none';}
function tryUserLogin(){
  const name = document.getElementById('user-login-name').value;
  const p = document.getElementById('user-login-pw').value;
  const u = users.find(x => x.name === name && x.pw === p);
  if(u) { currentUser = name; document.getElementById('user-welcome').textContent = "Hi, " + name; show('screen-user'); }
  else showToast('user-login-toast', 'Invalid credentials', 'error');
}
function logout(){location.reload();}
function switchTab(t, b){
  document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  document.getElementById('apanel-'+t).classList.add('active');
}
function selType(t, b){
  uType = t;
  document.querySelectorAll('.type-btn').forEach(x=>x.className='type-btn');
  b.className = 'type-btn sel-' + t.toLowerCase();
}
function showToast(id, msg, type='success'){
  const el = document.getElementById(id);
  el.textContent = msg; el.className = 'toast show ' + type;
  setTimeout(() => el.classList.remove('show'), 3000);
}

// Start
initApp();
</script>
