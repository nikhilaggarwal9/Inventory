<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Inventory Pro | Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        :root {
            --bg: #f8f9fa; --surface: #ffffff; --border: #e9ecef;
            --text: #212529; --text-light: #6c757d;
            --primary: #5b8fff; --success: #2d9e5f; --danger: #d64f4f; --warning: #c08a1e;
            --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }
        .screen { display: none; min-height: 100vh; padding: 20px; }
        .screen.active { display: block; }
        .container { max-width: 1000px; margin: 0 auto; }
        .auth-card { max-width: 400px; margin: 50px auto; background: var(--surface); padding: 2rem; border-radius: var(--radius); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .role-btn { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; background: var(--surface); text-align: left; transition: 0.2s; }
        .role-btn:hover { border-color: var(--primary); background: #f0f5ff; }
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 2rem; }
        .stat-card { background: var(--surface); padding: 1.5rem; border-radius: var(--radius); border: 1px solid var(--border); }
        .stat-val { font-size: 2rem; font-weight: 700; font-family: 'DM Mono'; }
        table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: var(--radius); overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { background: #f1f3f5; font-size: 0.75rem; text-transform: uppercase; color: var(--text-light); }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-p { background: var(--primary); color: white; }
        .btn-s { background: var(--border); color: var(--text); }
        .btn-d { background: #fff5f5; color: var(--danger); border: 1px solid #ffe3e3; }
        input, select { width: 100%; padding: 12px; margin: 8px 0 16px; border: 1px solid var(--border); border-radius: 8px; }
        .tab-bar { display: flex; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .tab-btn { padding: 10px 0; background: none; border: none; cursor: pointer; color: var(--text-light); border-bottom: 2px solid transparent; white-space: nowrap; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
        .badge-ok { background: #e6fcf5; color: var(--success); }
        .badge-low { background: #fff9db; color: var(--warning); }
        .badge-out { background: #fff5f5; color: var(--danger); }
        #loading-overlay { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    </style>
</head>
<body>

    <div id="loading-overlay">Connecting to Cloud Database...</div>

    <!-- LOGIN SCREEN -->
    <div id="screen-login" class="screen active">
        <div class="auth-card">
            <h1>Inventory Cloud</h1>
            <p style="color: var(--text-light); margin-bottom: 2rem;">Cloud Storage Enabled</p>
            <div id="login-main">
                <button class="role-btn" onclick="toggleAuthArea('admin')"><strong>Admin</strong><br><small>Full dashboard</small></button>
                <button class="role-btn" onclick="toggleAuthArea('user')"><strong>Team Member</strong><br><small>Record entries</small></button>
            </div>
            <div id="auth-area" style="display: none;">
                <h3 id="auth-title">Login</h3>
                <div id="user-name-field" style="display: none;"><label>Full Name</label><input type="text" id="login-name"></div>
                <label>Password</label><input type="password" id="login-pass">
                <button class="btn btn-p" style="width: 100%;" onclick="attemptLogin()">Sign In</button>
                <button class="btn btn-s" style="width: 100%; margin-top: 10px;" onclick="location.reload()">Back</button>
            </div>
        </div>
    </div>

    <!-- ADMIN SCREEN -->
    <div id="screen-admin" class="screen">
        <div class="container">
            <div class="nav"><h2>⚡ Admin</h2><button class="btn btn-s" onclick="logout()">Sign Out</button></div>
            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchTab('dash')">Overview</button>
                <button class="tab-btn" onclick="switchTab('items')">Inventory</button>
                <button class="tab-btn" onclick="switchTab('logs')">History</button>
                <button class="tab-btn" onclick="switchTab('team')">Team</button>
                <button class="tab-btn" onclick="switchTab('settings')">⚙️ Settings</button>
            </div>

            <div id="tab-dash" class="tab-content">
                <div class="grid">
                    <div class="stat-card"><div>Total Units</div><div class="stat-val" id="stat-units">0</div></div>
                    <div class="stat-card"><div>Items</div><div class="stat-val" id="stat-items">0</div></div>
                    <div class="stat-card"><div>Low Stock</div><div class="stat-val" id="stat-low" style="color: var(--danger);">0</div></div>
                </div>
                <table><thead><tr><th>Item</th><th>Stock</th><th>Action</th></tr></thead><tbody id="dash-table"></tbody></table>
            </div>

            <div id="tab-items" class="tab-content" style="display:none">
                <div class="stat-card" style="margin-bottom: 1rem;">
                    <h3>Add Item</h3>
                    <input type="text" id="new-item-name" placeholder="Name"><input type="number" id="new-item-stock" placeholder="Stock">
                    <button class="btn btn-p" onclick="handleAddItem()">Add</button>
                </div>
                <table id="manage-table"></table>
            </div>

            <div id="tab-logs" class="tab-content" style="display:none">
                <table><thead><tr><th>Time</th><th>Item</th><th>Type</th><th>Qty</th><th>User</th></tr></thead><tbody id="log-table"></tbody></table>
            </div>

            <div id="tab-team" class="tab-content" style="display:none">
                <div class="stat-card" style="margin-bottom: 1rem;"><input type="text" id="new-user-name" placeholder="Name"><input type="password" id="new-user-pass" placeholder="Pass"><button class="btn btn-p" onclick="handleAddUser()">Add Member</button></div>
                <div id="team-list"></div>
            </div>

            <div id="tab-settings" class="tab-content" style="display:none">
                <div class="stat-card" style="margin-bottom: 1rem;">
                    <h3>Change Admin Password</h3>
                    <label>New Password</label><input type="password" id="set-admin-pass">
                    <button class="btn btn-p" onclick="saveAdminPassword()">Update Password</button>
                </div>
                <div class="stat-card">
                    <h3>EmailJS Configuration</h3>
                    <label>Public Key</label><input type="text" id="set-ejs-key">
                    <label>Service ID</label><input type="text" id="set-ejs-svc">
                    <label>Template ID</label><input type="text" id="set-ejs-tpl">
                    <label>Admin Email</label><input type="text" id="set-admin-email">
                    <button class="btn btn-p" onclick="saveSettings()">Save Config</button>
                </div>
            </div>
        </div>
    </div>

    <!-- USER SCREEN -->
    <div id="screen-user" class="screen">
        <div class="container" style="max-width: 500px;">
            <div class="nav"><h2 id="user-greeting">Hello</h2><button class="btn btn-s" onclick="logout()">Logout</button></div>
            <div class="auth-card" style="margin-top: 0; max-width: 100%;">
                <label>Item</label><select id="entry-item"></select>
                <label>Type</label><select id="entry-type"><option value="IN">Stock In (+)</option><option value="OUT">Stock Out (-)</option><option value="ADJ">Adjust</option></select>
                <label>Quantity</label><input type="number" id="entry-qty" value="1">
                <button class="btn btn-p" style="width: 100%;" onclick="handleUserEntry()">Submit</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc, query, orderBy, limit, setDoc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2-G7-Xt4LnARWQ6L9TYIhiLXhs9HHg6E",
            authDomain: "automated-inventory-sync.firebaseapp.com",
            projectId: "automated-inventory-sync",
            storageBucket: "automated-inventory-sync.firebasestorage.app",
            messagingSenderId: "823946326055",
            appId: "1:823946326055:web:29ede9f4dbc33b02d2de02"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let inventory = [], logs = [], users = [], config = {};
        let currentMode = '', loggedInUser = '', cloudAdminPass = 'admin123';

        async function initRealtime() {
            // Check for initial seed
            const invCheck = await getDocs(collection(db, "inventory"));
            if (invCheck.empty) {
                const initialInventory = [{name:"Bahrain Diaries",stock:150}];
                for (let item of initialInventory) {
                    await addDoc(collection(db, "inventory"), { ...item, initial: item.stock || 1 });
                }
            }

            // Real-time Inventory Listener
            onSnapshot(collection(db, "inventory"), (snap) => {
                inventory = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                updateUI();
                document.getElementById('loading-overlay').style.display = 'none';
            });

            // Real-time Settings/Password Listener
            onSnapshot(doc(db, "settings", "appConfig"), (d) => {
                if (d.exists()) {
                    const data = d.data();
                    cloudAdminPass = data.adminPassword || 'admin123';
                    config = data.emailConfig || {};
                    if(config.publicKey) emailjs.init(config.publicKey);
                    fillSettingsUI();
                }
            });

            onSnapshot(query(collection(db, "logs"), orderBy("time", "desc"), limit(50)), (snap) => {
                logs = snap.docs.map(d => d.data());
                renderLogs();
            });

            onSnapshot(collection(db, "users"), (snap) => {
                users = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderTeam();
            });
        }

        // STOCK UPDATE & DASHBOARD RECALCULATION
        window.updateStock = async (id, name, currentStock, change, type, initial) => {
            let newQty;
            if (type === 'IN') newQty = currentStock + change;
            else if (type === 'OUT') newQty = Math.max(0, currentStock - change);
            else newQty = change;

            await updateDoc(doc(db, "inventory", id), { stock: newQty });
            await addDoc(collection(db, "logs"), {
                time: new Date().toISOString(),
                item: name, type, qty: change, user: loggedInUser || 'Admin'
            });

            // Email Alert Logic (35%)
            const threshold = initial * 0.35;
            if (type === 'OUT' && newQty <= threshold && config.serviceId) {
                emailjs.send(config.serviceId, config.templateId, {
                    item_name: name, current_stock: newQty, threshold: Math.round(threshold), to_email: config.adminEmail
                }).catch(e => console.error(e));
            }
        };

        // CUSTOM DELETE FUNCTION
        window.handleDeleteItem = async (id, name) => {
            if (confirm(`Are you sure you want to permanently delete "${name}" from the database?`)) {
                await deleteDoc(doc(db, "inventory", id));
                alert("Deleted successfully");
            }
        };

        // PASSWORD MANAGEMENT
        window.saveAdminPassword = async () => {
            const newPass = document.getElementById('set-admin-pass').value;
            if (newPass.length < 4) return alert("Password too short");
            await setDoc(doc(db, "settings", "appConfig"), { adminPassword: newPass }, { merge: true });
            alert("Admin password updated successfully");
            document.getElementById('set-admin-pass').value = '';
        };

        window.saveSettings = async () => {
            const emailConfig = {
                publicKey: document.getElementById('set-ejs-key').value,
                serviceId: document.getElementById('set-ejs-svc').value,
                templateId: document.getElementById('set-ejs-tpl').value,
                adminEmail: document.getElementById('set-admin-email').value
            };
            await setDoc(doc(db, "settings", "appConfig"), { emailConfig }, { merge: true });
            alert("Email settings saved");
        };

        function fillSettingsUI() {
            document.getElementById('set-ejs-key').value = config.publicKey || '';
            document.getElementById('set-ejs-svc').value = config.serviceId || '';
            document.getElementById('set-ejs-tpl').value = config.templateId || '';
            document.getElementById('set-admin-email').value = config.adminEmail || '';
        }

        // UI RENDERING
        function updateUI() {
            // Recalculate Stats for Dashboard
            const totalUnits = inventory.reduce((acc, curr) => acc + (Number(curr.stock) || 0), 0);
            const lowCount = inventory.filter(i => (i.stock / (i.initial || 1)) < 0.35).length;
            
            document.getElementById('stat-units').textContent = totalUnits;
            document.getElementById('stat-items').textContent = inventory.length;
            document.getElementById('stat-low').textContent = lowCount;

            // Dashboard Table
            document.getElementById('dash-table').innerHTML = inventory.map(i => {
                const pct = (i.stock / (i.initial || 1)) * 100;
                const status = i.stock === 0 ? 'Out' : pct < 35 ? 'Low' : 'OK';
                return `<tr><td><strong>${i.name}</strong></td><td>${i.stock} <span class="badge badge-${status.toLowerCase()}">${status}</span></td><td>
                    <button class="btn btn-s" onclick="updateStock('${i.id}','${i.name}', ${i.stock}, 1, 'IN', ${i.initial})">+</button>
                    <button class="btn btn-d" onclick="updateStock('${i.id}','${i.name}', ${i.stock}, 1, 'OUT', ${i.initial})">−</button>
                </td></tr>`;
            }).join('');

            // Inventory Manage Table (Custom Deletion)
            document.getElementById('manage-table').innerHTML = `
                <thead><tr><th>Item Name</th><th>Initial Stock</th><th>Action</th></tr></thead>
                <tbody>${inventory.map(i => `<tr><td>${i.name}</td><td>${i.initial}</td><td><button class="btn btn-d" onclick="handleDeleteItem('${i.id}','${i.name}')">Delete</button></td></tr>`).join('')}</tbody>
            `;
            
            document.getElementById('entry-item').innerHTML = inventory.map(i => `<option value="${i.name}">${i.name}</option>`).join('');
        }

        // AUTH & NAVIGATION
        window.toggleAuthArea = (m) => { currentMode = m; document.getElementById('login-main').style.display = 'none'; document.getElementById('auth-area').style.display = 'block'; document.getElementById('user-name-field').style.display = m==='user'?'block':'none'; };
        window.attemptLogin = () => {
            const p = document.getElementById('login-pass').value;
            if (currentMode === 'admin') {
                if (p === cloudAdminPass) showScreen('screen-admin'); else alert("Incorrect Admin Password");
            } else {
                const n = document.getElementById('login-name').value.trim();
                const u = users.find(x => x.name.toLowerCase() === n.toLowerCase() && x.pass === p);
                if (u) { loggedInUser = u.name; document.getElementById('user-greeting').textContent = "Hi, "+u.name; showScreen('screen-user'); } else alert("User Error");
            }
        };
        window.logout = () => location.reload();
        window.handleAddItem = async () => {
            const n = document.getElementById('new-item-name').value;
            const s = parseInt(document.getElementById('new-item-stock').value) || 0;
            if (n) await addDoc(collection(db, "inventory"), { name: n, stock: s, initial: s || 1 });
            document.getElementById('new-item-name').value = ''; document.getElementById('new-item-stock').value = '';
        };
        window.handleAddUser = async () => {
            const n = document.getElementById('new-user-name').value, p = document.getElementById('new-user-pass').value;
            if (n && p) await addDoc(collection(db, "users"), { name: n, pass: p });
            document.getElementById('new-user-name').value = ''; document.getElementById('new-user-pass').value = '';
        };
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        window.switchTab = (t) => { document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none'); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('tab-' + t).style.display = 'block'; event.target.classList.add('active'); };
        function renderLogs() { document.getElementById('log-table').innerHTML = logs.map(l => `<tr><td>${new Date(l.time).toLocaleTimeString()}</td><td>${l.item}</td><td>${l.type}</td><td>${l.qty}</td><td>${l.user}</td></tr>`).join(''); }
        function renderTeam() { document.getElementById('team-list').innerHTML = users.map(u => `<div class="nav" style="background:#fff; padding:10px; border-radius:8px; margin-bottom:5px;"><span>${u.name}</span><button class="btn btn-d" onclick="deleteDoc(doc(db,'users','${u.id}'))">Remove</button></div>`).join(''); }

        initRealtime();
    </script>
</body>
</html>
