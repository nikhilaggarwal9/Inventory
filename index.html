<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Database | Tbo Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet">
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        :root {
            --bg: #f5f7fb; --surface: #ffffff; --border: #e2e8f0;
            --text: #1a202c; --text-light: #718096;
            --primary: #5b8fff; --success: #2d9e5f; --danger: #e53e3e; --warning: #d69e2e;
            --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); }
        .header-logo { text-align: center; padding: 30px 0; background: white; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .header-logo img { height: 55px; width: auto; max-width: 90%; object-fit: contain; }
        .screen { display: none; min-height: 100vh; padding: 20px; }
        .screen.active { display: block; }
        .container { max-width: 1200px; margin: 0 auto; }
        .auth-card { max-width: 440px; margin: 40px auto; background: var(--surface); padding: 2.5rem; border-radius: var(--radius); box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: #fff; }
        .btn { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; width: 100%; margin-top: 10px; }
        .btn-p { background: var(--primary); color: white; }
        .btn-g { background: white; color: #444; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .btn-g svg { width: 18px; height: 18px; }
        .btn-s { background: var(--border); color: var(--text); }
        .btn-danger { background: var(--danger); color: white; width: auto; padding: 6px 12px; font-size: 12px; }
        .btn-approve { background: var(--success); color: white; width: auto; padding: 6px 12px; font-size: 12px; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .tab-bar { display: flex; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .tab-btn { padding: 10px 0; background: none; border: none; cursor: pointer; color: var(--text-light); border-bottom: 2px solid transparent; white-space: nowrap; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }
        .card { background: var(--surface); padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: var(--radius); overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { background: #f8fafc; color: var(--text-light); font-size: 11px; text-transform: uppercase; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
        .badge-ok { background: #e6fcf5; color: var(--success); }
        .badge-low { background: #fff5f5; color: var(--danger); }
        #stock-preview { background: #ebf4ff; color: var(--primary); padding: 18px; border-radius: 10px; font-weight: 700; text-align: center; margin-bottom: 20px; border: 1px dashed var(--primary); font-size: 20px; }
        #loading-overlay { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    </style>
</head>
<body>

    <div id="loading-overlay">Tbo Academy | Database Connecting...</div>

    <div class="header-logo">
        <img id="tbo-logo" src="https://www.tboacademy.com/images/black-option-1.png" alt="Tbo Academy" onerror="this.style.display='none'">
    </div>

    <!-- LOGIN -->
    <div id="screen-login" class="screen active">
        <div class="auth-card">
            <h1>Inventory Database</h1>
            <p style="color: var(--text-light); margin-bottom: 2rem;">Internal Management Portal</p>
            <div id="auth-main">
                <button class="btn btn-g" onclick="loginWithGoogle()">
                    <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 3.66 29.261 2 24 2 11.85 2 2 11.85 2 24s9.85 22 22 22c11.045 0 20-8.955 20-20 0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 3.66 29.261 2 24 2c-7.22 0-13.639 3.414-17.694 8.691z"/><path fill="#4CAF50" d="M24 46c11.045 0 20-8.955 20-20 0-1.341-.138-2.65-.389-3.917H24v8h11.303c-1.127 3.181-3.415 5.812-6.303 7.461l6.303 7.461C39.117 41.282 43.14 34.12 44 26.083z"/><path fill="#1976D2" d="M6.306 33.309l6.571-4.819C14.655 32.892 18.961 36 24 36c2.888 0 5.524-.962 7.697-2.539l6.303 7.461C34.015 44.186 29.282 46 24 46c-7.22 0-13.639-3.414-17.694-8.691z"/></svg>
                    Sign in with Google
                </button>
                <button class="btn btn-p" onclick="showEmailForm()">Email & Password</button>
                <hr style="margin: 20px 0; border:0; border-top: 1px solid #eee;">
                <button class="btn btn-s" onclick="showAdminPin()">Admin Access</button>
            </div>
            <div id="email-area" style="display:none;">
                <input type="email" id="auth-email" placeholder="Email"><input type="password" id="auth-pass" placeholder="Password">
                <button class="btn btn-p" onclick="handleEmail('login')">Sign In</button>
                <button class="btn btn-s" onclick="handleEmail('signup')">Sign Up</button>
                <button class="btn btn-s" onclick="location.reload()" style="background:none;">Back</button>
            </div>
            <div id="admin-area" style="display:none;">
                <input type="password" id="admin-pin" placeholder="Admin Secret Pin">
                <button class="btn btn-p" onclick="tryAdminLogin()">Open Dashboard</button>
                <button class="btn btn-s" onclick="location.reload()" style="background:none;">Back</button>
            </div>
        </div>
    </div>

    <!-- PENDING -->
    <div id="screen-pending" class="screen">
        <div class="auth-card"><h2>Access Restricted</h2><p>Wait for Admin approval.</p><button class="btn btn-s" onclick="signOutUser()">Logout</button></div>
    </div>

    <!-- USER UI -->
    <div id="screen-user" class="screen">
        <div class="container" style="max-width: 600px;">
            <div class="nav"><h2 id="user-name-tag">Hello</h2><button class="btn btn-s" style="width:auto;" onclick="signOutUser()">Logout</button></div>
            <div class="card">
                <div id="stock-preview">Select an item...</div>
                <label>Item</label><select id="user-items" onchange="updatePreview()"></select>
                <label>Action</label><select id="user-type"><option value="OUT">Stock Out (-)</option><option value="IN">Restock (+)</option></select>
                <label>Quantity</label><input type="number" id="user-qty" value="1" min="1">
                <label>Purpose (Mandatory)</label><textarea id="user-notes"></textarea>
                <button class="btn btn-p" onclick="submitUserEntry()">Submit Update</button>
            </div>
        </div>
    </div>

    <!-- ADMIN -->
    <div id="screen-admin" class="screen">
        <div class="container">
            <div class="nav"><h2>⚡ Admin Control</h2><button class="btn btn-s" style="width:auto;" onclick="location.reload()">Exit</button></div>
            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchTab('overview')">Overview</button>
                <button class="tab-btn" onclick="switchTab('team')">Requests <span id="req-badge" style="background:red; color:white; border-radius:50%; padding:2px 6px; font-size:10px; display:none;">0</span></button>
                <button class="tab-btn" onclick="switchTab('inv')">Inventory</button>
                <button class="tab-btn" onclick="switchTab('logs')">History</button>
                <button class="tab-btn" onclick="switchTab('set')">Settings</button>
            </div>
            <div id="tab-overview" class="tab-content"><table id="admin-dash-list"></table></div>
            <div id="tab-team" class="tab-content" style="display:none">
                <h3>Requests</h3><table id="pending-table"></table>
                <h3 style="margin-top:20px">Authorized Team</h3><table id="approved-table"></table>
            </div>
            <div id="tab-inv" class="tab-content" style="display:none">
                <div class="card"><h3>Add Item</h3><input type="text" id="add-name" placeholder="Name"><input type="number" id="add-qty" placeholder="Opening Total Stock"><button class="btn btn-p" onclick="adminAddItem()">Create</button></div>
                <table id="admin-inv-list"></table>
            </div>
            <div id="tab-logs" class="tab-content" style="display:none">
                <div style="text-align:right; margin-bottom:10px;"><button class="btn btn-s" style="width:auto" onclick="downloadCSV()">Export Excel</button></div>
                <table id="admin-log-list"></table>
            </div>
            <div id="tab-set" class="tab-content" style="display:none">
                <div class="card">
                    <h3>Notification Recipients</h3>
                    <label>To: Email 1</label><input type="email" id="set-e1">
                    <label>To: Email 2</label><input type="email" id="set-e2">
                    <label>Cc: Email</label><input type="email" id="set-ecc">
                    <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
                    <h3>EmailJS Configuration</h3>
                    <label>Public Key</label><input type="text" id="set-key">
                    <label>Service ID</label><input type="text" id="set-svc">
                    <label>Template ID</label><input type="text" id="set-tpl">
                    <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
                    <label>Admin Access PIN</label><input type="password" id="set-pin">
                    <button class="btn btn-p" onclick="saveAdminSet()">Save All Settings</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, setDoc, getDoc, updateDoc, onSnapshot, query, orderBy, limit, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2-G7-Xt4LnARWQ6L9TYIhiLXhs9HHg6E",
            authDomain: "automated-inventory-sync.firebaseapp.com",
            projectId: "automated-inventory-sync",
            storageBucket: "automated-inventory-sync.firebasestorage.app",
            messagingSenderId: "823946326055",
            appId: "1:823946326055:web:29ede9f4dbc33b02d2de02"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const gProvider = new GoogleAuthProvider();

        let inv = [], logs = [], users = [], settings = {};
        let adminPin = 'admin123', isAdmin = false;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const uRef = doc(db, "users_metadata", user.uid);
                const uSnap = await getDoc(uRef);
                if (!uSnap.exists()) await setDoc(uRef, { uid: user.uid, name: user.displayName || user.email.split('@')[0], email: user.email, approved: false });
                onSnapshot(uRef, snap => {
                    if (isAdmin) return;
                    if (snap.data()?.approved) { showScreen('screen-user'); document.getElementById('user-name-tag').textContent = "Hello, " + snap.data().name; initSync(); }
                    else { showScreen('screen-pending'); }
                });
            } else if (!isAdmin) showScreen('screen-login');
            document.getElementById('loading-overlay').style.display = 'none';
        });

        window.loginWithGoogle = () => signInWithPopup(auth, gProvider);
        window.handleEmail = (type) => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            if(type === 'login') signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
            else createUserWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
        };
        window.signOutUser = () => signOut(auth).then(() => location.reload());

        window.showAdminPin = () => { document.getElementById('auth-main').style.display='none'; document.getElementById('admin-area').style.display='block'; };
        window.tryAdminLogin = () => {
            if (document.getElementById('admin-pin').value === adminPin) { isAdmin = true; showScreen('screen-admin'); initSync(); onSnapshot(collection(db, "users_metadata"), s => { users = s.docs.map(d => d.data()); renderUserTables(); }); onSnapshot(query(collection(db, "logs"), orderBy("time", "desc"), limit(100)), s => { logs = s.docs.map(d => d.data()); renderLogs(); }); }
            else alert("Invalid PIN");
        };

        function initSync() {
            onSnapshot(collection(db, "inventory"), s => { 
                inv = s.docs.map(d => ({id: d.id, ...d.data()})); renderAdminInv(); 
                const sel = document.getElementById('user-items');
                if (sel) { sel.innerHTML = inv.map(i => `<option value="${i.name}">${i.name}</option>`).join(''); updatePreview(); }
            });
        }

        // --- INTEGRATED UPDATED CORE LOGIC ---
        window.submitUserEntry = async () => {
            const itemName = String(document.getElementById('user-items').value);
            const type = document.getElementById('user-type').value;
            const qty = parseInt(document.getElementById('user-qty').value);
            const note = document.getElementById('user-notes').value.trim();
            const item = inv.find(i => i.name === itemName);

            if(!note || isNaN(qty) || qty < 1) return alert("Fill all fields.");
            if(type === 'OUT' && qty > item.stock) return alert("Insufficient stock.");

            const newQty = type === 'IN' ? item.stock + qty : item.stock - qty;
            const percentage = (newQty / (item.initial || 1)) * 100;

            // 1. Update Database
            await updateDoc(doc(db, "inventory", item.id), { stock: newQty });
            await addDoc(collection(db, "logs"), { 
                time: new Date().toISOString(), 
                item: itemName, 
                type, 
                qty, 
                user: auth.currentUser.email, 
                note 
            });

            // 2. Sense 35% Logic
            if (type === 'OUT' && percentage <= 35) {
                if (settings.ejsSvc && settings.ejsTpl) {
                    
                    // Build the formatted list for the grey box
                    const lowItems = inv.filter(i => {
                        const s = (i.name === itemName) ? newQty : i.stock;
                        return (s / (i.initial || 1)) <= 0.35;
                    });

                    const formattedList = lowItems.map(i => {
                        const current = (i.name === itemName) ? newQty : i.stock;
                        const initial = i.initial || 1;
                        const pct = Math.round((current / initial) * 100);
                        return `• ${i.name}\n  Stock: ${current} / ${initial} units (${pct}% remaining)`;
                    }).join('\n\n');

                    // Handle Recipients
                    let toEmails = [];
                    if(settings.e1) toEmails.push(settings.e1);
                    if(settings.e2) toEmails.push(settings.e2);

                    // Send to EmailJS
                    emailjs.send(settings.ejsSvc, settings.ejsTpl, {
                        items_list: formattedList,             // Matches {{items_list}}
                        total_alerts: lowItems.length,         // Matches {{total_alerts}}
                        sent_at: new Date().toLocaleString(),   // Matches {{sent_at}}
                        to_email: toEmails.join(', '),         // To: field
                        cc_email: settings.ecc || ''           // Cc: field
                    }).then(() => console.log("Email sent successfully"));
                }
            }

            alert("Success! Stock updated.");
            document.getElementById('user-notes').value = "";
            document.getElementById('user-qty').value = "1";
        };

        window.updatePreview = () => {
            const i = inv.find(x => x.name === document.getElementById('user-items').value);
            const pre = document.getElementById('stock-preview');
            if (i) {
                const pct = Math.round((i.stock / (i.initial || 1)) * 100);
                pre.innerHTML = `Stock Available: ${i.stock} Units (${pct}%)`;
                pre.style.color = pct <= 35 ? 'var(--danger)' : 'var(--primary)';
            }
        };

        function renderAdminInv() {
            if (document.getElementById('admin-dash-list')) {
                document.getElementById('admin-dash-list').innerHTML = `<thead><tr><th>Item</th><th>Stock</th><th>Level (%)</th><th>Status</th></tr></thead><tbody>` + 
                inv.map(i => {
                    const pct = Math.round((i.stock/(i.initial||1))*100);
                    const badge = i.stock === 0 ? 'out' : pct <= 35 ? 'low' : 'ok';
                    const col = pct <= 35 ? 'color:red; font-weight:700' : 'color:green';
                    return `<tr><td>${i.name}</td><td><strong>${i.stock}</strong></td><td style="${col}">${pct}%</td><td><span class="badge badge-${badge}">${badge.toUpperCase()}</span></td></tr>`;
                }).join('') + `</tbody>`;
                document.getElementById('admin-inv-list').innerHTML = `<thead><tr><th>Item</th><th>Action</th></tr></thead><tbody>` + inv.map(i => `<tr><td>${i.name} (Opening: ${i.initial})</td><td><button class="btn-danger" onclick="deleteDoc(doc(db,'inventory','${i.id}'))">Delete</button></td></tr>`).join('') + `</tbody>`;
            }
        }

        window.toggleAccess = async (uid, status) => { await updateDoc(doc(db, "users_metadata", uid), { approved: status }); };
        function renderUserTables() {
            const p = users.filter(u => !u.approved), a = users.filter(u => u.approved);
            const b = document.getElementById('req-badge');
            if(b) { if(p.length > 0) { b.textContent = p.length; b.style.display = 'inline'; } else { b.style.display = 'none'; } }
            document.getElementById('pending-table').innerHTML = p.map(u => `<tr><td>${u.name}</td><td><button class="btn-approve" onclick="toggleAccess('${u.uid}', true)">Approve</button></td></tr>`).join('');
            document.getElementById('approved-table').innerHTML = a.map(u => `<tr><td>${u.name}</td><td>${u.email}</td><td><button class="btn-danger" onclick="toggleAccess('${u.uid}', false)">Revoke</button></td></tr>`).join('');
        }

        onSnapshot(doc(db, "settings", "config"), (d) => {
            if(d.exists()) {
                const data = d.data(); adminPin = data.pin || 'admin123'; settings = data;
                if(data.ejsKey) emailjs.init(data.ejsKey);
                if(document.getElementById('set-pin')) {
                    document.getElementById('set-pin').value = data.pin || '';
                    document.getElementById('set-e1').value = data.e1 || '';
                    document.getElementById('set-e2').value = data.e2 || '';
                    document.getElementById('set-ecc').value = data.ecc || '';
                    document.getElementById('set-key').value = data.ejsKey || '';
                    document.getElementById('set-svc').value = data.ejsSvc || '';
                    document.getElementById('set-tpl').value = data.ejsTpl || '';
                }
            }
        });

        window.saveAdminSet = async () => {
            await setDoc(doc(db, "settings", "config"), { 
                pin: document.getElementById('set-pin').value, e1: document.getElementById('set-e1').value, e2: document.getElementById('set-e2').value, ecc: document.getElementById('set-ecc').value, ejsKey: document.getElementById('set-key').value, ejsSvc: document.getElementById('set-svc').value, ejsTpl: document.getElementById('set-tpl').value 
            });
            alert("Settings Saved Globally!");
        };

        window.showEmailForm = () => { document.getElementById('auth-main').style.display='none'; document.getElementById('email-area').style.display='block'; };
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        window.switchTab = (t) => { document.querySelectorAll('.tab-content').forEach(c => c.style.display='none'); document.getElementById('tab-'+t).style.display='block'; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); if(event) event.target.classList.add('active'); };
        window.adminAddItem = async () => { const n = document.getElementById('add-name').value, q = parseInt(document.getElementById('add-qty').value) || 0; if(n) await addDoc(collection(db, "inventory"), { name: n, stock: q, initial: q || 1 }); document.getElementById('add-name').value=''; document.getElementById('add-qty').value=''; };
        function renderLogs() { if(document.getElementById('admin-log-list')) document.getElementById('admin-log-list').innerHTML = `<thead><tr><th>Time</th><th>Item</th><th>Type</th><th>User</th></tr></thead><tbody>` + logs.map(l => `<tr><td>${new Date(l.time).toLocaleTimeString()}</td><td>${l.item}</td><td>${l.type}</td><td><small>${l.user}</small></td></tr>`).join('') + `</tbody>`; }
        window.downloadCSV = () => { let csv = "Time,Item,Type,User\n"; logs.forEach(l => csv += `${new Date(l.time).toLocaleString().replace(',','')},${l.item},${l.type},${l.user}\n`); const b = new Blob([csv], {type:'text/csv'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'Inventory_Log.csv'; a.click(); };
    </script>
</body>
</html>
