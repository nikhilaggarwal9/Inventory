<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Inventory Pro</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        :root {
            --bg: #f8f9fa; --surface: #ffffff; --border: #e9ecef;
            --text: #212529; --text-light: #6c757d;
            --primary: #5b8fff; --success: #2d9e5f; --danger: #d64f4f; --warning: #c08a1e;
            --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }
        
        /* Layouts */
        .screen { display: none; min-height: 100vh; padding: 20px; }
        .screen.active { display: block; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Login Styles */
        .auth-card { max-width: 400px; margin: 100px auto; background: var(--surface); padding: 2rem; border-radius: var(--radius); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .role-btn { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; background: var(--surface); text-align: left; transition: 0.2s; }
        .role-btn:hover { border-color: var(--primary); background: #f0f5ff; }

        /* UI Components */
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 2rem; }
        .stat-card { background: var(--surface); padding: 1.5rem; border-radius: var(--radius); border: 1px solid var(--border); }
        .stat-val { font-size: 2rem; font-weight: 700; font-family: 'DM Mono'; }
        
        table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: var(--radius); overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #f1f3f5; font-size: 0.8rem; text-transform: uppercase; color: var(--text-light); }

        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-p { background: var(--primary); color: white; }
        .btn-s { background: var(--border); color: var(--text); }
        .btn-d { background: #fff5f5; color: var(--danger); border: 1px solid #ffe3e3; }

        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; }
        
        .tab-bar { display: flex; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
        .tab-btn { padding: 10px 0; background: none; border: none; cursor: pointer; color: var(--text-light); border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
        .badge-ok { background: #e6fcf5; color: var(--success); }
        .badge-low { background: #fff9db; color: var(--warning); }
        .badge-out { background: #fff5f5; color: var(--danger); }

        #loading-overlay { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    </style>
</head>
<body>

    <div id="loading-overlay">Connecting to Cloud...</div>

    <!-- 1. LOGIN SCREEN -->
    <div id="screen-login" class="screen active">
        <div class="auth-card">
            <h1 style="margin-bottom: 0.5rem;">Inventory Cloud</h1>
            <p style="color: var(--text-light); margin-bottom: 2rem;">Select your access level</p>
            
            <div id="login-main">
                <button class="role-btn" onclick="toggleAuthArea('admin')">
                    <strong>Admin Access</strong><br><small>Manage stock, users, and settings</small>
                </button>
                <button class="role-btn" onclick="toggleAuthArea('user')">
                    <strong>Team Member</strong><br><small>Record stock movements</small>
                </button>
            </div>

            <div id="auth-area" style="display: none;">
                <h3 id="auth-title">Login</h3>
                <div id="user-name-field" style="display: none;">
                    <label>Full Name</label>
                    <input type="text" id="login-name" placeholder="Enter your name">
                </div>
                <label>Password</label>
                <input type="password" id="login-pass" placeholder="••••••••">
                <button class="btn btn-p" style="width: 100%;" onclick="attemptLogin()">Sign In</button>
                <button class="btn btn-s" style="width: 100%; margin-top: 10px;" onclick="location.reload()">Back</button>
            </div>
        </div>
    </div>

    <!-- 2. ADMIN SCREEN -->
    <div id="screen-admin" class="screen">
        <div class="container">
            <div class="nav">
                <h2>⚡ Admin Dashboard</h2>
                <button class="btn btn-s" onclick="logout()">Sign Out</button>
            </div>

            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchTab('dash')">Overview</button>
                <button class="tab-btn" onclick="switchTab('items')">Inventory</button>
                <button class="tab-btn" onclick="switchTab('logs')">History</button>
                <button class="tab-btn" onclick="switchTab('team')">Team</button>
            </div>

            <!-- Dash Tab -->
            <div id="tab-dash" class="tab-content">
                <div class="grid">
                    <div class="stat-card"><div>Total Units</div><div class="stat-val" id="stat-units">0</div></div>
                    <div class="stat-card"><div>Items</div><div class="stat-val" id="stat-items">0</div></div>
                    <div class="stat-card"><div>Low Stock</div><div class="stat-val" id="stat-low" style="color: var(--danger);">0</div></div>
                </div>
                <table>
                    <thead><tr><th>Item</th><th>Stock</th><th>Action</th></tr></thead>
                    <tbody id="dash-table"></tbody>
                </table>
            </div>

            <!-- Items Tab -->
            <div id="tab-items" class="tab-content" style="display:none">
                <div class="stat-card" style="margin-bottom: 2rem;">
                    <h3>Add New Item</h3>
                    <input type="text" id="new-item-name" placeholder="Item Name (e.g. Dubai Diary)">
                    <input type="number" id="new-item-stock" placeholder="Initial Stock">
                    <button class="btn btn-p" onclick="handleAddItem()">Add to Inventory</button>
                </div>
                <table id="manage-table"></table>
            </div>

            <!-- Logs Tab -->
            <div id="tab-logs" class="tab-content" style="display:none">
                <table>
                    <thead><tr><th>Time</th><th>Item</th><th>Type</th><th>Qty</th><th>User</th></tr></thead>
                    <tbody id="log-table"></tbody>
                </table>
            </div>

            <!-- Team Tab -->
            <div id="tab-team" class="tab-content" style="display:none">
                <div class="stat-card" style="margin-bottom: 2rem;">
                    <h3>Add Team Member</h3>
                    <input type="text" id="new-user-name" placeholder="Full Name">
                    <input type="password" id="new-user-pass" placeholder="Password">
                    <button class="btn btn-p" onclick="handleAddUser()">Add Member</button>
                </div>
                <div id="team-list"></div>
            </div>
        </div>
    </div>

    <!-- 3. USER SCREEN -->
    <div id="screen-user" class="screen">
        <div class="container" style="max-width: 500px;">
            <div class="nav">
                <h2 id="user-greeting">Hello</h2>
                <button class="btn btn-s" onclick="logout()">Logout</button>
            </div>
            <div class="auth-card" style="margin-top: 0; max-width: 100%;">
                <h3>Stock Entry</h3>
                <label>Item</label>
                <select id="entry-item"></select>
                
                <label>Transaction Type</label>
                <select id="entry-type">
                    <option value="IN">Stock In (+)</option>
                    <option value="OUT">Stock Out (-)</option>
                    <option value="ADJ">Set Absolute (Adjust)</option>
                </select>

                <label>Quantity</label>
                <input type="number" id="entry-qty" value="1">

                <button class="btn btn-p" style="width: 100%;" onclick="handleUserEntry()">Submit Update</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Import Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 1. CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyB2-G7-Xt4LnARWQ6L9TYIhiLXhs9HHg6E",
            authDomain: "automated-inventory-sync.firebaseapp.com",
            projectId: "automated-inventory-sync",
            storageBucket: "automated-inventory-sync.firebasestorage.app",
            messagingSenderId: "823946326055",
            appId: "1:823946326055:web:29ede9f4dbc33b02d2de02"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 2. STATE
        let inventory = [];
        let logs = [];
        let users = [];
        let currentMode = ''; 
        let loggedInUser = '';

        // 3. DATA SYNC (Real-time)
        function initRealtime() {
            // Sync Inventory
            onSnapshot(collection(db, "inventory"), (snap) => {
                inventory = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                updateUI();
                document.getElementById('loading-overlay').style.display = 'none';
            });

            // Sync Logs
            onSnapshot(query(collection(db, "logs"), orderBy("time", "desc"), limit(50)), (snap) => {
                logs = snap.docs.map(d => d.data());
                renderLogs();
            });

            // Sync Users
            onSnapshot(collection(db, "users"), (snap) => {
                users = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderTeam();
            });
        }

        // 4. AUTH LOGIC
        window.toggleAuthArea = (mode) => {
            currentMode = mode;
            document.getElementById('login-main').style.display = 'none';
            document.getElementById('auth-area').style.display = 'block';
            document.getElementById('auth-title').textContent = mode === 'admin' ? 'Admin Login' : 'Team Member Login';
            document.getElementById('user-name-field').style.display = mode === 'user' ? 'block' : 'none';
        };

        window.attemptLogin = () => {
            const pass = document.getElementById('login-pass').value;
            const name = document.getElementById('login-name').value.trim();

            if (currentMode === 'admin') {
                if (pass === 'admin123') { // Fixed admin password
                    showScreen('screen-admin');
                } else { alert("Wrong Admin Password"); }
            } else {
                const user = users.find(u => u.name.toLowerCase() === name.toLowerCase() && u.pass === pass);
                if (user) {
                    loggedInUser = user.name;
                    document.getElementById('user-greeting').textContent = `Hi, ${user.name}`;
                    showScreen('screen-user');
                } else { alert("User not found or password incorrect"); }
            }
        };

        window.logout = () => location.reload();

        // 5. INVENTORY LOGIC
        window.handleAddItem = async () => {
            const name = document.getElementById('new-item-name').value;
            const stock = parseInt(document.getElementById('new-item-stock').value) || 0;
            if (!name) return;

            await addDoc(collection(db, "inventory"), { name, stock, initial: stock || 1 });
            document.getElementById('new-item-name').value = '';
            document.getElementById('new-item-stock').value = '';
        };

        window.updateStock = async (id, name, currentStock, change, type) => {
            let newQty;
            if (type === 'IN') newQty = currentStock + change;
            else if (type === 'OUT') newQty = Math.max(0, currentStock - change);
            else newQty = change;

            await updateDoc(doc(db, "inventory", id), { stock: newQty });
            await addDoc(collection(db, "logs"), {
                time: new Date().toISOString(),
                item: name,
                type: type,
                qty: change,
                user: loggedInUser || 'Admin'
            });
        };

        window.handleUserEntry = async () => {
            const itemName = document.getElementById('entry-item').value;
            const type = document.getElementById('entry-type').value;
            const qty = parseInt(document.getElementById('entry-qty').value);
            const item = inventory.find(i => i.name === itemName);

            if (!item || isNaN(qty)) return;
            await updateStock(item.id, item.name, item.stock, qty, type);
            alert("Updated successfully!");
        };

        // 6. TEAM MANAGEMENT
        window.handleAddUser = async () => {
            const name = document.getElementById('new-user-name').value;
            const pass = document.getElementById('new-user-pass').value;
            if (!name || !pass) return;
            await addDoc(collection(db, "users"), { name, pass });
            document.getElementById('new-user-name').value = '';
            document.getElementById('new-user-pass').value = '';
        };

        // 7. UI RENDERING
        function updateUI() {
            // Stats
            const totalUnits = inventory.reduce((acc, curr) => acc + curr.stock, 0);
            const lowCount = inventory.filter(i => (i.stock / i.initial) < 0.35).length;
            
            document.getElementById('stat-units').textContent = totalUnits;
            document.getElementById('stat-items').textContent = inventory.length;
            document.getElementById('stat-low').textContent = lowCount;

            // Dashboard Table
            let dashHtml = '';
            inventory.forEach(i => {
                const pct = (i.stock / i.initial) * 100;
                const status = i.stock === 0 ? 'Out' : pct < 35 ? 'Low' : 'OK';
                dashHtml += `<tr>
                    <td><strong>${i.name}</strong></td>
                    <td>${i.stock} <span class="badge badge-${status.toLowerCase()}">${status}</span></td>
                    <td>
                        <button class="btn btn-s" onclick="updateStock('${i.id}','${i.name}', ${i.stock}, 1, 'IN')">+</button>
                        <button class="btn btn-d" onclick="updateStock('${i.id}','${i.name}', ${i.stock}, 1, 'OUT')">−</button>
                    </td>
                </tr>`;
            });
            document.getElementById('dash-table').innerHTML = dashHtml;

            // Manage Table
            document.getElementById('manage-table').innerHTML = `
                <thead><tr><th>Name</th><th>Initial</th><th>Action</th></tr></thead>
                <tbody>${inventory.map(i => `<tr><td>${i.name}</td><td>${i.initial}</td><td><button class="btn btn-d" onclick="deleteDoc(doc(db,'inventory','${i.id}'))">Delete</button></td></tr>`).join('')}</tbody>
            `;

            // User Dropdown
            document.getElementById('entry-item').innerHTML = inventory.map(i => `<option value="${i.name}">${i.name}</option>`).join('');
        }

        function renderLogs() {
            document.getElementById('log-table').innerHTML = logs.map(l => `
                <tr>
                    <td style="font-size: 0.7rem;">${new Date(l.time).toLocaleString()}</td>
                    <td>${l.item}</td>
                    <td><strong>${l.type}</strong></td>
                    <td>${l.qty}</td>
                    <td>${l.user}</td>
                </tr>
            `).join('');
        }

        function renderTeam() {
            document.getElementById('team-list').innerHTML = users.map(u => `
                <div class="nav" style="background: white; padding: 10px; border-radius: 8px; margin-bottom: 5px;">
                    <span>${u.name}</span>
                    <button class="btn btn-d" onclick="deleteDoc(doc(db,'users','${u.id}'))">Remove</button>
                </div>
            `).join('') || '<p>No team members yet</p>';
        }

        // Helper: Screen Switcher
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).style.display = 'block';
            event.target.classList.add('active');
        };

        // Start
        initRealtime();

    </script>
</body>
</html>
