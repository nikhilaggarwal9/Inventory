<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Database | Tbo Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        :root {
            --bg: #f5f7fb; --surface: #ffffff; --border: #e2e8f0;
            --text: #1a202c; --text-light: #718096;
            --primary: #5b8fff; --success: #2d9e5f; --danger: #e53e3e;
            --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); }
        .header-logo { text-align: center; padding: 30px 0; background: white; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .header-logo img { height: 55px; width: auto; max-width: 90%; }
        .screen { display: none; min-height: 100vh; padding: 20px; }
        .screen.active { display: block; }
        .container { max-width: 1200px; margin: 0 auto; }
        .auth-card { max-width: 440px; margin: 40px auto; background: var(--surface); padding: 2.5rem; border-radius: var(--radius); box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: #fff; margin-bottom: 15px; }
        label { font-size: 13px; font-weight: 600; color: var(--text-light); display: block; text-align: left; }
        .btn { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; width: 100%; }
        .btn-p { background: var(--primary); color: white; margin-top: 10px; }
        .btn-g { background: white; color: #444; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 10px; }
        .btn-s { background: var(--border); color: var(--text); margin-top: 10px; }
        .btn-danger { background: var(--danger); color: white; width: auto; padding: 6px 12px; font-size: 11px; border-radius: 4px; border: none; }
        .btn-approve { background: var(--success); color: white; width: auto; padding: 6px 12px; font-size: 11px; border-radius: 4px; border: none; }
        .btn-edit { background: #edf2ff; color: var(--primary); width: auto; padding: 6px 12px; font-size: 11px; border: 1px solid #d0dfff; margin-right: 5px; border-radius: 4px; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .tab-bar { display: flex; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .tab-btn { padding: 10px 0; background: none; border: none; cursor: pointer; color: var(--text-light); border-bottom: 2px solid transparent; white-space: nowrap; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }
        .card { background: var(--surface); padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: var(--radius); overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { background: #f8fafc; color: var(--text-light); font-size: 11px; text-transform: uppercase; }
        .user-table-row.selected { background-color: #f0f7ff; }
        .qty-input-small { width: 70px !important; padding: 5px !important; margin: 0 !important; text-align: center; }
        #loading-overlay { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; font-weight: 700; }
    </style>
</head>
<body>

    <div id="loading-overlay">Tbo Academy | Syncing Data...</div>

    <div class="header-logo">
        <img src="https://www.tboacademy.com/images/black-option-1.png" alt="Tbo Academy">
    </div>

    <!-- LOGIN SCREEN -->
    <div id="screen-login" class="screen active">
        <div class="auth-card">
            <h1>Inventory Database</h1>
            <div id="auth-main">
                <button class="btn btn-g" onclick="loginWithGoogle()">Sign in with Google</button>
                <button class="btn btn-p" onclick="showEmailForm()">Email Login</button>
            </div>
            <div id="email-area" style="display:none;">
                <input type="email" id="auth-email" placeholder="Email"><input type="password" id="auth-pass" placeholder="Password">
                <button class="btn btn-p" onclick="handleEmail('login')">Sign In</button>
                <button class="btn btn-s" onclick="location.reload()" style="background:none;">Back</button>
            </div>
            <div id="admin-area" style="display:none;">
                <input type="password" id="admin-pin" placeholder="Enter Admin PIN">
                <button class="btn btn-p" onclick="tryAdminLogin()">Unlock Control Panel</button>
                <button class="btn btn-s" onclick="signOutUser()" style="background:none;">Logout</button>
            </div>
        </div>
    </div>

    <!-- PENDING SCREEN -->
    <div id="screen-pending" class="screen">
        <div class="auth-card"><h2>Access Restricted</h2><p>Wait for Admin approval.</p><button class="btn btn-s" onclick="signOutUser()">Logout</button></div>
    </div>

    <!-- NEW UPDATED USER SCREEN -->
    <div id="screen-user" class="screen">
        <div class="container" style="max-width: 800px;">
            <div class="nav"><h2 id="user-name-tag">Hello</h2><button class="btn btn-s" style="width:auto;" onclick="signOutUser()">Logout</button></div>
            
            <div class="card">
                <h3 style="margin-bottom:15px;">Bulk Stock Out</h3>
                <p style="font-size: 12px; color: gray; margin-bottom: 10px;">Select items, enter quantity, and provide event details.</p>
                
                <table>
                    <thead>
                        <tr>
                            <th style="width:50px">Sel</th>
                            <th>Item Name</th>
                            <th>In Stock</th>
                            <th style="width:100px">Take</th>
                        </tr>
                    </thead>
                    <tbody id="user-bulk-list">
                        <!-- Items load here via JS -->
                    </tbody>
                </table>

                <div style="margin-top:25px; border-top:1px solid #eee; padding-top:20px;">
                    <label>Event Name / Purpose (Mandatory)</label>
                    <textarea id="bulk-note" placeholder="e.g. Sales Training Dubai"></textarea>
                    
                    <label>Date of Event (Mandatory)</label>
                    <input type="date" id="bulk-date">

                    <button class="btn btn-p" id="submit-btn" onclick="submitBulkUpdate()">Submit Entire Batch</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ADMIN SCREEN (Identical to your working version) -->
    <div id="screen-admin" class="screen">
        <div class="container">
            <div class="nav"><h2>⚡ Admin Control</h2><button class="btn btn-s" style="width:auto;" onclick="signOutUser()">Logout</button></div>
            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchTab('overview')">Overview</button>
                <button class="tab-btn" onclick="switchTab('team')">Users <span id="req-badge" style="background:red; color:white; border-radius:50%; padding:2px 6px; font-size:10px; display:none;">0</span></button>
                <button class="tab-btn" onclick="switchTab('inv')">Inventory</button>
                <button class="tab-btn" onclick="switchTab('logs')">History</button>
                <button class="tab-btn" onclick="switchTab('set')">Settings</button>
            </div>

            <div id="tab-overview" class="tab-content"><table id="admin-dash-list"></table></div>
            
            <div id="tab-team" class="tab-content" style="display:none">
                <h3>Requests</h3><table id="pending-table"></table>
                <h3 style="margin-top:20px">Authorized Team</h3><table id="approved-table"></table>
            </div>

            <div id="tab-inv" class="tab-content" style="display:none">
                <div class="card" id="create-card">
                    <h3>Add Item</h3>
                    <input type="text" id="add-name" placeholder="Name">
                    <input type="number" id="add-qty" placeholder="Opening Stock">
                    <button class="btn btn-p" onclick="adminAddItem()">Create</button>
                </div>
                <div class="card" id="update-card" style="display:none; border: 2px solid var(--primary);">
                    <h3>Edit Item</h3>
                    <input type="hidden" id="edit-id">
                    <label>Name</label><input type="text" id="edit-name">
                    <label>Stock</label><input type="number" id="edit-stock">
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-p" onclick="saveItemUpdate()">Save</button>
                        <button class="btn btn-s" onclick="cancelEdit()">Cancel</button>
                    </div>
                </div>
                <table id="admin-inv-list"></table>
            </div>

            <div id="tab-logs" class="tab-content" style="display:none">
                <div style="text-align:right; margin-bottom:10px;"><button class="btn btn-s" style="width:auto" onclick="downloadCSV()">Export CSV</button></div>
                <table id="admin-log-list"></table>
            </div>

            <div id="tab-set" class="tab-content" style="display:none">
                <div class="card">
                    <h3>Recipients</h3>
                    <label>To: Email 1</label><input type="email" id="set-e1">
                    <label>To: Email 2</label><input type="email" id="set-e2">
                    <label>Cc: Email</label><input type="email" id="set-ecc">
                    <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
                    <h3>EmailJS Keys</h3>
                    <label>Public Key</label><input type="text" id="set-key">
                    <label>Service ID</label><input type="text" id="set-svc">
                    <label>Template ID</label><input type="text" id="set-tpl">
                    <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
                    <label>Admin Pin</label><input type="password" id="set-pin">
                    <button class="btn btn-p" onclick="saveAdminSet()">Save Settings</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, setDoc, getDoc, updateDoc, onSnapshot, query, orderBy, limit, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2-G7-Xt4LnARWQ6L9TYIhiLXhs9HHg6E",
            authDomain: "automated-inventory-sync.firebaseapp.com",
            projectId: "automated-inventory-sync",
            storageBucket: "automated-inventory-sync.firebasestorage.app",
            messagingSenderId: "823946326055",
            appId: "1:823946326055:web:29ede9f4dbc33b02d2de02"
        };

        const ADMIN_EMAIL = "nikhilmfd24@gmail.com";
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const gProvider = new GoogleAuthProvider();

        let inv = [], logs = [], users = [], settings = {};
        let adminPin = 'admin123', isAdmin = false;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                if (user.email === ADMIN_EMAIL) { isAdmin = true; showAdminArea(); }
                else {
                    const uRef = doc(db, "users_metadata", user.uid);
                    const uSnap = await getDoc(uRef);
                    if (!uSnap.exists()) await setDoc(uRef, { uid: user.uid, name: user.displayName || user.email.split('@')[0], email: user.email, approved: false });
                    onSnapshot(uRef, snap => {
                        if (snap.data()?.approved) { showScreen('screen-user'); document.getElementById('user-name-tag').textContent = "Hello, " + snap.data().name; initSync(); }
                        else showScreen('screen-pending');
                    });
                }
            } else { isAdmin = false; showScreen('screen-login'); }
            document.getElementById('loading-overlay').style.display = 'none';
        });

        window.loginWithGoogle = () => signInWithPopup(auth, gProvider);
        window.handleEmail = (type) => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            if(type === 'login') signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
            else createUserWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
        };
        window.signOutUser = () => signOut(auth).then(() => location.reload());

        function showAdminArea() { document.getElementById('auth-main').style.display='none'; document.getElementById('admin-area').style.display='block'; }
        window.tryAdminLogin = () => {
            if (document.getElementById('admin-pin').value === adminPin) {
                showScreen('screen-admin'); initSync();
                onSnapshot(collection(db, "users_metadata"), s => { users = s.docs.map(d => d.data()); renderUserTables(); }); 
                onSnapshot(query(collection(db, "logs"), orderBy("time", "desc"), limit(100)), s => { logs = s.docs.map(d => d.data()); renderLogs(); }); 
            } else alert("Wrong PIN");
        };

        function initSync() {
            onSnapshot(collection(db, "inventory"), s => {
                inv = s.docs.map(d => ({id: d.id, ...d.data()}));
                renderUserBulkList();
                renderAdminInv();
            });
            onSnapshot(doc(db, "settings", "config"), d => {
                if(d.exists()) {
                    settings = d.data(); adminPin = settings.pin || 'admin123';
                    if(settings.ejsKey) emailjs.init(settings.ejsKey);
                    const el = document.getElementById('set-pin');
                    if(el) {
                        el.value = adminPin; document.getElementById('set-e1').value = settings.e1 || '';
                        document.getElementById('set-e2').value = settings.e2 || ''; document.getElementById('set-ecc').value = settings.ecc || '';
                        document.getElementById('set-key').value = settings.ejsKey || ''; document.getElementById('set-svc').value = settings.ejsSvc || '';
                        document.getElementById('set-tpl').value = settings.ejsTpl || '';
                    }
                }
            });
        }

        // --- NEW USER INTERFACE LOGIC ---
        function renderUserBulkList() {
            const list = document.getElementById('user-bulk-list');
            if(!list) return;
            list.innerHTML = inv.map(item => `
                <tr id="row-${item.id}" class="user-table-row">
                    <td><input type="checkbox" class="bulk-check" data-id="${item.id}" onchange="toggleRowHighlight('${item.id}')"></td>
                    <td>${item.name}</td>
                    <td><strong>${item.stock}</strong></td>
                    <td><input type="number" id="qty-${item.id}" class="qty-input-small" value="0" min="0"></td>
                </tr>
            `).join('');
        }

        window.toggleRowHighlight = (id) => {
            const row = document.getElementById(`row-${id}`);
            row.classList.toggle('selected');
        };

        window.submitBulkUpdate = async () => {
            const note = document.getElementById('bulk-note').value.trim();
            const date = document.getElementById('bulk-date').value;
            if(!note || !date) return alert("Purpose and Event Date are mandatory.");

            const checks = document.querySelectorAll('.bulk-check:checked');
            if(checks.length === 0) return alert("Select at least one item.");

            document.getElementById('submit-btn').disabled = true;
            document.getElementById('submit-btn').innerText = "Processing...";

            try {
                for(let check of checks) {
                    const id = check.dataset.id;
                    const qty = parseInt(document.getElementById(`qty-${id}`).value);
                    const item = inv.find(i => i.id === id);

                    if(qty > 0) {
                        if(qty > item.stock) { alert(`Error: Not enough ${item.name}`); continue; }
                        const newStock = item.stock - qty;
                        await updateDoc(doc(db, "inventory", id), { stock: newStock });
                        await addDoc(collection(db, "logs"), { 
                            time: new Date().toISOString(), 
                            item: item.name, 
                            type: 'OUT', 
                            qty: qty, 
                            user: auth.currentUser.email, 
                            note: `Event: ${note} | Date: ${date}` 
                        });
                    }
                }
                alert("Inventory Synced Successfully!");
                location.reload();
            } catch (e) {
                alert("Error: " + e.message);
                document.getElementById('submit-btn').disabled = false;
            }
        };

        // --- ADMIN DATABASE ACTIONS (Untouched) ---
        window.adminAddItem = async () => {
            const n = document.getElementById('add-name').value, q = parseInt(document.getElementById('add-qty').value) || 0;
            if(n) await addDoc(collection(db, "inventory"), { name: n, stock: q, initial: q || 1 });
            document.getElementById('add-name').value=''; document.getElementById('add-qty').value='';
        };
        window.deleteItem = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "inventory", id)); };
        window.saveItemUpdate = async () => {
            const id = document.getElementById('edit-id').value, n = document.getElementById('edit-name').value, s = parseInt(document.getElementById('edit-stock').value);
            await updateDoc(doc(db, "inventory", id), { name: n, stock: s });
            cancelEdit();
        };
        window.saveAdminSet = async () => {
            await setDoc(doc(db, "settings", "config"), { 
                pin: document.getElementById('set-pin').value, e1: document.getElementById('set-e1').value, e2: document.getElementById('set-e2').value, 
                ecc: document.getElementById('set-ecc').value, ejsKey: document.getElementById('set-key').value, 
                ejsSvc: document.getElementById('set-svc').value, ejsTpl: document.getElementById('set-tpl').value 
            });
            alert("Settings Saved!");
        };
        window.toggleAccess = async (uid, s) => await updateDoc(doc(db, "users_metadata", uid), { approved: s });

        // --- ADMIN UI RENDERING ---
        function renderAdminInv() {
            if(!document.getElementById('admin-dash-list')) return;
            document.getElementById('admin-dash-list').innerHTML = `<thead><tr><th>Item</th><th>Units</th><th>Status</th></tr></thead><tbody>` + 
                inv.map(i => `<tr><td>${i.name}</td><td>${i.stock}</td><td>${(i.stock/(i.initial||1))<=0.35?'LOW':'OK'}</td></tr>`).join('') + `</tbody>`;
            document.getElementById('admin-inv-list').innerHTML = `<thead><tr><th>Item</th><th>Action</th></tr></thead><tbody>` + 
                inv.map(i => `<tr><td>${i.name}</td><td><button class="btn-edit" onclick="editItem('${i.id}')">Edit</button><button class="btn-danger" onclick="deleteItem('${i.id}')">Delete</button></td></tr>`).join('') + `</tbody>`;
        }
        function renderUserTables() {
            const p = users.filter(u => !u.approved), a = users.filter(u => u.approved);
            document.getElementById('req-badge').style.display = p.length ? 'inline' : 'none';
            document.getElementById('req-badge').textContent = p.length;
            document.getElementById('pending-table').innerHTML = p.map(u => `<tr><td>${u.email}</td><td><button class="btn-approve" onclick="toggleAccess('${u.uid}',true)">Approve</button></td></tr>`).join('');
            document.getElementById('approved-table').innerHTML = a.map(u => `<tr><td>${u.email}</td><td><button class="btn-danger" onclick="toggleAccess('${u.uid}',false)">Revoke</button></td></tr>`).join('');
        }
        function renderLogs() {
            document.getElementById('admin-log-list').innerHTML = `<thead><tr><th>Time</th><th>Item</th><th>Qty</th><th>User</th><th>Note</th></tr></thead><tbody>` + 
                logs.map(l => `<tr><td>${new Date(l.time).toLocaleTimeString()}</td><td>${l.item}</td><td>${l.qty}</td><td>${l.user}</td><td>${l.note||''}</td></tr>`).join('') + `</tbody>`;
        }

        window.editItem = (id) => { const i = inv.find(x=>x.id===id); document.getElementById('create-card').style.display='none'; document.getElementById('update-card').style.display='block'; document.getElementById('edit-id').value=id; document.getElementById('edit-name').value=i.name; document.getElementById('edit-stock').value=i.stock; };
        window.cancelEdit = () => { document.getElementById('create-card').style.display='block'; document.getElementById('update-card').style.display='none'; };
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        window.switchTab = (t) => { document.querySelectorAll('.tab-content').forEach(c => c.style.display='none'); document.getElementById('tab-'+t).style.display='block'; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); };
        window.showEmailForm = () => { document.getElementById('auth-main').style.display='none'; document.getElementById('email-area').style.display='block'; };
        window.downloadCSV = () => { let csv = "Time,Item,Qty,User,Note\n"; logs.forEach(l => csv += `${l.time},${l.item},${l.qty},${l.user},"${l.note||''}"\n`); const b = new Blob([csv],{type:'text/csv'}); const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download='History.csv'; a.click(); };
    </script>
</body>
</html>
